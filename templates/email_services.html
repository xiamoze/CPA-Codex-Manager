<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱服务 - Codex</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23007AFF'/><circle cx='50' cy='50' r='20' fill='white'/></svg>">
    <style>
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .card-header[style],
            .form-actions,
            .form-row,
            .modal-header {
                align-items: stretch !important;
            }

            .card-header[style] {
                flex-direction: column !important;
            }

            .card-header[style] > div,
            .card-header[style] > button {
                width: 100%;
            }

            #add-fields-container {
                margin-bottom: 16px !important;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>
    <div class="">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-brand">
                <h1>{{ app_display_name }}</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">账号注册</a>
                <a href="/accounts" class="nav-link">账号管理</a>
                <a href="/cliproxy-cleaner" class="nav-link">CPA 检测</a>
                <a href="/email-services" class="nav-link active">邮箱服务</a>
                <a href="/settings" class="nav-link">系统设置</a>
                <a href="/logout" class="nav-link">退出</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" onclick="theme.toggle()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <path
                            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                    </svg>
                </button>
                <button class="mobile-nav-toggle" type="button" data-mobile-nav-toggle="mobile-nav-email-services" aria-expanded="false" aria-label="打开导航菜单">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
            </div>
        </nav>
        <div class="mobile-nav" id="mobile-nav-email-services">
            <div class="mobile-nav-links">
                <a href="/" class="mobile-nav-link">账号注册</a>
                <a href="/accounts" class="mobile-nav-link">账号管理</a>
                <a href="/cliproxy-cleaner" class="mobile-nav-link">CPA 检测</a>
                <a href="/email-services" class="mobile-nav-link active">邮箱服务</a>
                <a href="/settings" class="mobile-nav-link">系统设置</a>
                <a href="/logout" class="mobile-nav-link">退出</a>
            </div>
        </div>

        <main class="container main-content">
            <div class="page-header">
                <h2>邮箱服务管理</h2>
                <p class="subtitle">配置和管理用于注册的邮箱提供商</p>
            </div>

            <!-- 数据概览 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="custom-count" style="color: #007AFF;">0</div>
                    <div class="stat-label">自定义服务商</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="tempmail-status">可用</div>
                    <div class="stat-label">临时邮箱</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-enabled">0</div>
                    <div class="stat-label">已启用总数</div>
                </div>
            </div>

            <!-- 自定义服务商表格 -->
            <div class="card">
                <div class="card-header" style="align-items: center;">
                    <h3>自定义邮箱服务</h3>
                    <button class="btn btn-primary btn-sm" id="add-custom-btn">添加服务商</button>
                </div>
                <div class="card-body" style="padding: 0;">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 48px;"><input type="checkbox" id="select-all-custom"></th>
                                    <th>名称</th>
                                    <th style="width: 100px;">类型</th>
                                    <th style="width: 220px;">地址</th>
                                    <th style="width: 100px;">状态</th>
                                    <th style="width: 80px;">优先级</th>
                                    <th style="width: 160px;">最后使用</th>
                                    <th style="width: 140px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="custom-services-table">
                                <!-- 动态内容 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 临时邮箱设置 -->
            <div class="card">
                <div class="card-header">
                    <h3>临时邮箱配置 (Tempmail.lol)</h3>
                </div>
                <div class="card-body">
                    <form id="tempmail-form">
                        <div class="form-group">
                            <label for="tempmail-api">API 地址</label>
                            <input type="text" id="tempmail-api" name="api_url" placeholder="https://tempmail.lol/api">
                        </div>
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="checkbox" id="tempmail-enabled" checked>
                                <span style="font-size: 13px;">启用临时邮箱服务</span>
                            </label>
                        </div>
                        <div class="form-actions" style="margin-top: 24px;">
                            <button type="submit" class="btn btn-primary">保存设置</button>
                            <button type="button" class="btn btn-secondary" id="test-tempmail-btn">测试连接</button>
                        </div>
                    </form>
                </div>
            </div>

            <footer class="site-footer">
                设计与开发由 <a href="https://github.com/Maoleio/CPA-Codex-Manager" target="_blank" rel="noopener noreferrer">Maoleio</a>
            </footer>
        </main>
    </div>

    <!-- 添加服务商模态框 -->
    <div class="modal" id="add-custom-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加邮箱服务商</h3>
            </div>
            <div class="modal-body">
                <form id="add-custom-form">
                    <div class="form-group">
                        <label for="custom-name">服务名称</label>
                        <input type="text" id="custom-name" name="name" required placeholder="例如：我的域名邮箱">
                    </div>
                    <div class="form-group">
                        <label for="custom-sub-type">服务类型</label>
                        <select id="custom-sub-type" name="sub_type">
                            <option value="freemail">Freemail</option>
                            <option value="cloudmail">CloudMail</option>
                        </select>
                    </div>

                    <div id="add-fields-container" style="margin-bottom: 24px;">
                        <!-- 动态字段由 email_services.js 填充 -->
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>优先级</label>
                            <input type="number" id="custom-priority" name="priority" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 8px; margin-top: 32px;">
                                <input type="checkbox" id="custom-enabled" name="enabled" checked> 启用
                            </label>
                        </div>
                    </div>

                    <div class="form-actions" style="margin-top: 24px;">
                        <button type="submit" class="btn btn-primary">创建服务</button>
                        <button type="button" class="btn btn-secondary" id="cancel-add-custom">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 编辑自定义邮箱服务模态框 -->
    <div class="modal" id="edit-custom-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑邮箱服务商</h3>
                <div id="edit-custom-type-badge" class="status-badge">CloudMail</div>
            </div>
            <div class="modal-body">
                <form id="edit-custom-form">
                    <input type="hidden" id="edit-custom-id">
                    <input type="hidden" id="edit-custom-sub-type-hidden" name="sub_type">

                    <div class="form-group">
                        <label for="edit-custom-name">服务名称</label>
                        <input type="text" id="edit-custom-name" name="name" required>
                    </div>

                    <div id="edit-moemail-fields" style="display: none;">
                        <div class="form-group">
                            <label for="edit-custom-api-url">服务地址</label>
                            <input type="text" id="edit-custom-api-url" name="api_url">
                        </div>
                        <div class="form-group">
                            <label for="edit-custom-api-key">API Key</label>
                            <input type="text" id="edit-custom-api-key" name="api_key">
                        </div>
                        <div class="form-group">
                            <label for="edit-custom-domain">默认域名</label>
                            <input type="text" id="edit-custom-domain" name="domain">
                        </div>
                    </div>

                    <div id="edit-tempmail-fields" style="display: none;">
                        <div class="form-group">
                            <label for="edit-tm-base-url">服务地址</label>
                            <input type="text" id="edit-tm-base-url" name="tm_base_url">
                        </div>
                        <div class="form-group">
                            <label for="edit-tm-admin-password">管理员密码</label>
                            <input type="text" id="edit-tm-admin-password" name="tm_admin_password">
                        </div>
                        <div class="form-group">
                            <label for="edit-tm-domain">域名</label>
                            <input type="text" id="edit-tm-domain" name="tm_domain">
                        </div>
                    </div>

                    <div id="edit-duckmail-fields" style="display: none;">
                        <div class="form-group">
                            <label for="edit-dm-base-url">服务地址</label>
                            <input type="text" id="edit-dm-base-url" name="dm_base_url">
                        </div>
                        <div class="form-group">
                            <label for="edit-dm-api-key">API Key</label>
                            <input type="text" id="edit-dm-api-key" name="dm_api_key">
                        </div>
                        <div class="form-group">
                            <label for="edit-dm-domain">默认域名</label>
                            <input type="text" id="edit-dm-domain" name="dm_domain">
                        </div>
                        <div class="form-group">
                            <label for="edit-dm-password-length">密码长度</label>
                            <input type="number" id="edit-dm-password-length" name="dm_password_length" min="6" value="12">
                        </div>
                    </div>

                    <div id="edit-freemail-fields" style="display: none;">
                        <div class="form-group">
                            <label for="edit-fm-base-url">服务地址</label>
                            <input type="text" id="edit-fm-base-url" name="fm_base_url">
                        </div>
                        <div class="form-group">
                            <label for="edit-fm-admin-token">管理员 Token</label>
                            <input type="text" id="edit-fm-admin-token" name="fm_admin_token">
                        </div>
                        <div class="form-group">
                            <label for="edit-fm-domain">域名</label>
                            <input type="text" id="edit-fm-domain" name="fm_domain">
                        </div>
                    </div>

                    <div id="edit-cloudmail-fields" style="display: none;">
                        <div class="form-group">
                            <label for="edit-cm-base-url">服务地址</label>
                            <input type="text" id="edit-cm-base-url" name="cm_base_url">
                        </div>
                        <div class="form-group">
                            <label for="edit-cm-admin-email">管理员邮箱</label>
                            <input type="email" id="edit-cm-admin-email" name="cm_admin_email">
                        </div>
                        <div class="form-group">
                            <label for="edit-cm-admin-password">管理员密码</label>
                            <input type="text" id="edit-cm-admin-password" name="cm_admin_password">
                        </div>
                        <div class="form-group">
                            <label for="edit-cm-domain">域名</label>
                            <input type="text" id="edit-cm-domain" name="cm_domain" placeholder="example.com 或 a.com,b.com">
                        </div>
                    </div>

                    <div id="edit-imap-fields" style="display: none;">
                        <div class="form-group">
                            <label for="edit-imap-host">IMAP 主机</label>
                            <input type="text" id="edit-imap-host" name="imap_host">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="edit-imap-port">端口</label>
                                <input type="number" id="edit-imap-port" name="imap_port" value="993">
                            </div>
                            <div class="form-group">
                                <label for="edit-imap-use-ssl">SSL</label>
                                <select id="edit-imap-use-ssl" name="imap_use_ssl">
                                    <option value="true">启用</option>
                                    <option value="false">关闭</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="edit-imap-email">邮箱</label>
                            <input type="email" id="edit-imap-email" name="imap_email">
                        </div>
                        <div class="form-group">
                            <label for="edit-imap-password">密码 / 授权码</label>
                            <input type="text" id="edit-imap-password" name="imap_password">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-custom-priority">优先级</label>
                            <input type="number" id="edit-custom-priority" name="priority" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 8px; margin-top: 32px;">
                                <input type="checkbox" id="edit-custom-enabled" name="enabled"> 启用
                            </label>
                        </div>
                    </div>

                    <div class="form-actions" style="margin-top: 24px;">
                        <button type="submit" class="btn btn-primary">保存修改</button>
                        <button type="button" class="btn btn-secondary" id="cancel-edit-custom">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js?v={{ static_version }}"></script>
    <script src="/static/js/email_services.js?v={{ static_version }}"></script>
</body>

</html>
