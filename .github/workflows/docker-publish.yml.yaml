# .github/workflows/docker-publish.yml
name: 🐳 Build & Push Docker Image

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  # 如需支持 arm64 请改为: linux/amd64,linux/arm64
  PLATFORMS: linux/amd64

jobs:
  build-and-push:
    name: Build & Publish Image
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || 
        startsWith(github.ref, 'refs/tags/') || 
        github.ref == 'refs/heads/main' || 
        github.ref == 'refs/heads/master'

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔤 Normalize Image Name
        id: normalize
        run: |
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "registry=ghcr.io" >> $GITHUB_OUTPUT

      - name: 🔄 Set up QEMU
        if: contains(env.PLATFORMS, 'arm64')
        uses: docker/setup-qemu-action@v3

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.normalize.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.normalize.outputs.registry }}/${{ steps.normalize.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: 🚀 Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' || github.event.inputs.push_image == 'true' }}
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
            PIP_TRUSTED_HOST=pypi.tuna.tsinghua.edu.cn
            APT_MIRROR=https://mirrors.tuna.tsinghua.edu.cn

      - name: 🔍 Set Scan Reference
        id: scan-ref
        run: |
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | head -n 1)
          echo "ref=$FIRST_TAG" >> $GITHUB_OUTPUT

      - name: 🔍 Scan Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        if: success()
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          scan-after-push: true

      - name: 📊 Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "docker-image-scan"

      - name: 📋 Build Summary
        if: always()
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ steps.normalize.outputs.registry }}/${{ steps.normalize.outputs.image_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: ${{ env.PLATFORMS }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }} / ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
