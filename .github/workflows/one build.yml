name: Build Desktop Artifacts

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: CPA-Codex-Manager
  PYINSTALLER_VERSION: "6.11.1"

jobs:
 build-windows:
  name: Build Windows
  runs-on: windows-latest
  steps:
    - name: 📦 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: 📦 Install Dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install -e .
        # ✅ 显式安装 pyinstaller 到当前环境
        python -m pip install "pyinstaller==6.11.1" pillow

    - name: 🔨 Build Windows Artifact
      shell: cmd
      env:
        PYTHON_CMD: python      # ✅ 关键：与 setup-python 一致
        PIP_CMD: python -m pip
        APP_VERSION: ${{ github.ref_name }}  # 注入版本
      run: scripts\build_windows.bat onefile

    - name: 📤 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CPA-Codex-Manager-windows
        path: |
          dist/CPA-Codex-Manager.exe
          dist/CPA-Codex-Manager/*.exe
        if-no-files-found: error
        retention-days: 7
  release:
    name: 🚀 Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows
          path: release-assets/windows

      - name: 📝 Generate Release Notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"* %s (%h)" $PREV_TAG..HEAD > release-notes.md
          else
            echo "* Initial release" > release-notes.md
          fi
          echo "path=release-notes.md" >> $GITHUB_OUTPUT

      - name: 📦 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/windows/**/*.exe
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
